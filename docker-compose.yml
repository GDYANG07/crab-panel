version: '3.8'

services:
  crab-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crab-panel
    # 使用 host 网络模式以便连接到宿主机的 OpenClaw Gateway
    network_mode: host
    ports:
      - "3000:3000"
    volumes:
      # 挂载 OpenClaw 配置目录（只读）
      - ~/.openclaw:/root/.openclaw:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
